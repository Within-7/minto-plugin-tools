<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subsection}} - {{topic}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .slide-container {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            position: relative;
            padding: 60px 80px;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 3px solid #2c3e50;
            margin-bottom: 35px;
        }

        .header-title {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
        }

        .header-title .section {
            color: #3498db;
        }

        .header-logo {
            display: flex;
            align-items: center;
        }

        .logo-image {
            height: 50px;
            width: auto;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            gap: 35px;
            height: calc(100% - 110px);
        }

        /* 左侧文字分析区 */
        .analysis-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            padding: 28px 35px;
        }

        .user-type-title {
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #3498db;
            text-align: center;
        }

        .section-block {
            margin-bottom: 18px;
        }

        .section-block:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: #3498db;
            border-radius: 2px;
        }

        .section-content {
            font-size: 14px;
            line-height: 1.85;
            color: #444;
            text-align: justify;
        }

        /* 右侧Instagram截图区 */
        .instagram-area {
            width: 480px;
            display: flex;
            flex-direction: column;
        }

        .instagram-card {
            flex: 1;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .instagram-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: rgba(255,255,255,0.9);
            font-size: 18px;
        }

        .instagram-placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- 顶部标题 -->
        <div class="header">
            <div class="header-title">
                <span class="section">{{section}}</span>
                <span>　　{{subsection}}</span>
            </div>
            <div class="header-logo">
                <img src="{{logoPath}}" alt="Logo" class="logo-image">
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧文字分析区 -->
            <div class="analysis-area">
                <div class="user-type-title">{{userTypeTitle}}</div>

                <div class="section-block">
                    <div class="section-title">人群规模</div>
                    <div class="section-content">
                        {{populationContent}}
                    </div>
                </div>

                <div class="section-block">
                    <div class="section-title">人群年龄水平</div>
                    <div class="section-content">
                        {{ageContent}}
                    </div>
                </div>

                <div class="section-block">
                    <div class="section-title">人群消费水平和习惯</div>
                    <div class="section-content">
                        {{consumptionContent}}
                    </div>
                </div>
            </div>

            <!-- 右侧Instagram截图区 -->
            <div class="instagram-area">
                <div class="instagram-card">
                    <div class="instagram-placeholder">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                        </svg>
                        <span>Instagram 截图</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
