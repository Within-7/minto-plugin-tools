<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subsection}} - {{topic}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .slide-container {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            position: relative;
            padding: 60px 80px;
        }

        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 3px solid #2c3e50;
            margin-bottom: 35px;
        }

        .header-title {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
        }

        .header-title .section {
            color: #3498db;
        }

        .header-logo {
            display: flex;
            align-items: center;
        }

        .logo-image {
            height: 50px;
            width: auto;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            gap: 35px;
            height: calc(100% - 110px);
        }

        /* 左侧文字分析区 */
        .analysis-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            padding: 28px 35px;
        }

        .user-type-title {
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #3498db;
            text-align: center;
        }

        .section-block {
            margin-bottom: 18px;
        }

        .section-block:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: #3498db;
            border-radius: 2px;
        }

        .section-content {
            font-size: 14px;
            line-height: 1.85;
            color: #444;
            text-align: justify;
        }

        /* 右侧Instagram截图区 */
        .instagram-area {
            width: 480px;
            display: flex;
            flex-direction: column;
        }

        .instagram-card {
            flex: 1;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instagram-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- 顶部标题 -->
        <div class="header">
            <div class="header-title">
                <span class="section">{{section}}</span>
                <span>　　{{subsection}}</span>
            </div>
            <div class="header-logo">
                <img src="{{logoPath}}" alt="Logo" class="logo-image">
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧文字分析区 -->
            <div class="analysis-area">
                <div class="user-type-title">{{userTypeTitle}}</div>

                <div class="section-block">
                    <div class="section-title">人群规模</div>
                    <div class="section-content">
                        {{populationContent}}
                    </div>
                </div>

                <div class="section-block">
                    <div class="section-title">人群年龄水平</div>
                    <div class="section-content">
                        {{ageContent}}
                    </div>
                </div>

                <div class="section-block">
                    <div class="section-title">人群消费水平和习惯</div>
                    <div class="section-content">
                        {{consumptionContent}}
                    </div>
                </div>
            </div>

            <!-- 右侧Instagram截图区 -->
            <div class="instagram-area">
                <div class="instagram-card">
                    <img src="{{profileImagePath}}" alt="用户画像截图" class="instagram-image">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
